body:
  text: 解注混元上德皇帝道德二經之義乃宋徽宗道君皇帝御製是也南華真經逍遙遊真義指歸乃宋徽宗道君皇帝御製是也補注李玊德解靈寶度人經義真王君制序右解注真義高上神霄真玉説五方天中好生不殺頌右出神霄東極華堂妙濟經科之中誦之解脫物命夭枉之禍修好生不殺之功焉政和御製金籙中科儀右科儀為國修齋設醮祈禳福祐大洞招真通微妙章步虛玊清樂上清樂太清樂散花樂白鶴引右招真通微妙章受天明命歌金闕始青步虛歌章髙真道德步虛歌章尤道太微步虛歌章夏祭地祇降格出現記髙上神霄真王長生大帝降生記上清玉書真符照驗諸記冬祀天真降臨示現品記右諸真記神霄紀聖祕籙乃述長生大君同青華帝君前後飛神臨降禁掖昭示靈化之事神霄玉府東西二臺掌治諸仙卿祕傳右諸傳乃紀述諸仙卿修真得道掌領神霄職任之事右神霄內府所存三洞四輔有自古以傳者或多見於世間有歷劫未傳禁祕寶經一千二百卷分為六等一十二品列為上中下三卷藏于東西華堂自太平啓運壬辰庚子之後漸當降顯有得備上一經法者稱神霄王天洞景法師虛元統化真卿道成得為玉府上相上宰真伯之任有得備中一經法者當稱神霄洞化法師保度合明真卿道成得為東西二臺仙卿仙侯之任有得備下一經法者當稱神霄元化法師靈妙通元真卿道成得為東西二臺仙官長吏九宫真宰之任其法服玉清雲臺寶冠紫靈翠玉之簪飛雲鬱靄緑光之帔三十六條褐黃裳飛青之裙朱陽之履洞靈碧瑶之圭三氣交暉玉珮震耀消魔之劒長三尺六寸躡九氣之壇若三階之中或得上經中經下經卷帙未備或兼三洞在世一二經法當稱為神霄太平輔化弟子道成得為諸天仙真之任或亦補為神府散官仙吏之職但未得專處髙清玉天之貴不能必掌神符上司之權焉其法服素玉三華碧冠或三素元冠紫精水玉之簪素紫之帔三十六條碧褐黃裳緑青之裙黃華瑶簡朱履玉珮五氣丹精之劒長三尺二寸躡三光八緯之壇若有受其經法三階俱備道成則登三天髙皇道君之位與諸聖齊倫者矣非拜表上章朝真閲籙行事其法服不可輒服靈官檢察墮道之功髙上神霄宗師受經式
