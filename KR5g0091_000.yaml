body:
  text: 解註混元上德皇帝道德二經之義乃宋徽宗道君皇帝御製是也南華眞經逍遥遊眞義指歸乃宋徽宗道君皇帝御製是也補註李玊德解靈寳度人經義眞王君制序右解註眞義高上神霄眞玉說五方天中好生不殺頌右出神霄東極華堂妙濟經科之中誦之解脫物命夭枉之禍修好生不殺之功焉政和御製金籙中科儀右科儀爲國修齋設醮祈禳福祐大洞招眞通微妙章歩虚玊清樂上清樂太清樂散花樂白鶴引右招眞通微妙章受天明命歌金闕始青歩虚歌章髙眞道德步虛歌章尤道太微歩虚歌章夏祭地祇降格出現記髙上神霄眞王長生大帝降生記上清玉書眞符照驗諸記冬祀天眞降臨示現品記右諸眞記神霄紀聖祕籙乃述長生大君同青華帝君前後飛神臨降禁掖昭示靈化之事神霄玉府東西二臺掌治諸仙卿祕傳右諸傳乃紀述諸仙卿修眞得道掌領神霄職任之事右神霄内府所存三洞四輔有自古以傳者或多見於世間有歷劫未傳禁祕寳經一千二百卷分爲六等一十二品列爲上中下三卷藏于東西華堂自太平啓運壬辰庚子之後漸當降顯有得備上一經法者稱神霄王天洞景法師虚元統化眞卿道成得爲玉府上相上宰眞伯之任有得備中一經法者當稱神霄洞化法師保度合明眞卿道成得爲東西二臺仙卿仙侯之任有得備下一經法者當稱神霄元化法師靈妙通元眞卿道成得爲東西二臺仙官長吏九宫眞宰之任其法服玉清雲臺寳冠紫靈翠玉之簪飛雲鬱靄緑光之帔三十六條褐黄裳飛青之裙朱陽之履洞靈碧瑶之珪三炁交暉玉珮震耀消魔之劒長三尺六寸躡九炁之壇若三階之中或得上經中經下經卷帙未備或兼三洞在世一二經法當稱爲神霄太平輔化弟子道成得爲諸天仙眞之任或亦補爲神府散官仙吏之職但未得專處髙清玉天之貴不能必掌神符上司之權焉其法服素玉三華碧冠或三素元冠紫精水玉之簪素紫之帔三十六條碧褐黄裳緑青之裙黄華瑶簡朱履玉珮五炁丹精之劒長三尺二寸躡三光八緯之壇若有受其經法三階俱備道成則登三天髙皇道君之位與諸聖齊倫者矣非拜表上章朝眞閱籙行事其法服不可輙服靈官檢察墮道之功髙上神霄宗師受經式
