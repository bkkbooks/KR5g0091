front:
  text: 髙上神霄宗師受經式笙九上聖開圖明華散藹真元經粹妙範流芳粵在浩劫赤明之初元始之尊乘赤混太無靈積生之氣應化於東方始青諸天與十方天真大神上聖髙尊妙行真人無鞅數衆演説靈寶度人神霄衆經並以授於玉宸太上道君因命天真皇人并上清諸真人總其元義開品分條共為六十卷以應六甲之數皆以無量度人為首其經既成簡奏虛皇遂使藏于紫微上宫仍今付於神霄玉清真王君袐於東極華堂瓊室之內至於後劫方當下傳逮其炎宋興隆太平氣至時際吉會神霄真王當降世間以為人主遂舉其弟青華帝君代領神府之任真王受天明命紹承丕祚統御九有協和萬邦顯彰道化闡神元風政和壬辰之後青華時來密會禁掖神明齊契天人相通所以告於期運者焉於是真王飛神達變洞合紫清乃以神霄瓊室所祕靈寶真經六十卷又以昔侍元始同登鬱羅觀覽三元靈光玊網之氣而成髙上神霄玉清祕籙三卷嘗於上皇年間詳考於玉晨之手定格於紫微之房亦在神霄歷劫禁重今並當出乃遺左右仙卿仙吏將其經籙著以人間之義易以世俗之迹置設科式宣揚於志節之士若其得遇此道勤而修之皆是夙簡元名形繪帝軒三華錬骨五輝內纏克保為壬辰受度之人學真之士萬劫之中際遇此時是為難也可不勉之者哉玊清虛皇元始天尊為祖師上清玉宸元皇道君為宗師髙上神霄玉清真王長生大君為真師巳上髙上神霄大道三師髙上神霄太上洞玄靈寶度人經六十一卷太上洞玄靈寶度人上品妙經清微金科上品妙經禹餘玉律上品妙經大赤靈文上品妙經玉宸大道上品妙經太一元精上品妙經日精陽明上品妙經月華隂景上品妙經離合五行化體上品妙經斷絶胎根閉塞死戶上品妙經騰曜二景五星上品妙經扶桑青陽上品妙經素景曜靈上品妙經五方正氣上品妙經五行順治上品妙經天地八維安鎮國祚上品妙經求延劫運保世升平上品妙經飛神召靈上品妙經降真召靈上品妙經十方聖境上品妙經明體貫氣品九霄髙玄上品妙經九宫仙籍上品妙經八景神合上品妙經玉明運度上品妙經赤符丹光品紫光丹靈上品妙經碧落空歌上品妙經錬氣變仙上品妙經神變氣化上品妙經生化胎根斷除邪穢上品妙經回骸起死上品妙經長生久視上品妙經三晨光曜保命延生上品妙經降真延壽上品妙經保胎護命上品妙經消禳國君王侯世土上品妙經太一神變五福護國禳兵上品妙經七星除妖上品妙經神符除難上品妙經洞神禳災上品妙經祈禳水旱上品妙經消除災疫保命延年上品妙經除禳水火漂溺上品妙經解禳山谷瘴癘上品妙經消除病癘跛痾上品妙經顯瑞符應上品妙經隂陽化生上品妙經五行備足生靈壽域上品妙經安鎮九壘土妖不祥上品妙經祈求嗣續慶延門閥上品妙經蠲化水火災癘上品妙經玄明洞淵上品妙經南宫延生上品妙經北都除殃上品妙經斬馘不祥上品妙經斬滅五行邪怪上品妙經追度上世亡魂上品妙經解釋幽牢上品妙經濟度死魂上品妙經化尸受形上品妙經永斷輪轉上品妙經巳上經題各有太上洞玄靈寶無量度人上品妙經字髙上神霄靈寶度人經六十一卷並出於神霄東極華堂瓊室之中乃歷劫禁祕永傳經也得遇此道保巳則登升三境為人則却滅百痾功德協著克度神霄後當獲補宰制治化之官矣世人受誦修奉如法即得福慶無量功驗之應各如本經所載者髙上神霄玉清祕籙神霄玉清祕籙按太微科格與洞真齊妙亦上清之標冠矣可輔於大洞之品而受佩如法隨其學功各如本籙所言
