front:
  text: 髙上神霄宗師受經式笙九上聖開圖明華散藹眞元經粹妙範流芳粤在浩劫赤明之初元始之尊乗赤混太无靈積生之炁應化於東方始青諸天與十方天眞大神上聖髙尊妙行眞人無鞅數衆演說靈寳度人神霄衆經並以授於玉宸太上道君因命天眞皇人并上清諸眞人緫其元義開品分條共爲六十卷以應六甲之數皆以無量度人爲首其經旣成簡奏虚皇遂使藏于紫微上宫仍今付於神霄玉清眞王君袐於東極華堂瓊室之内至於後劫方當下傳逮其炎宋興隆太平炁至時際吉㑹神霄眞王當降世間以爲人主遂舉其弟青華帝君代領神府之任眞王受天明命紹承丕祚統御九有恊和萬邦顯彰道化闡神元風政和壬辰之後青華時來宻㑹禁掖神明齊契天人相通所以告於期運者焉於是眞王飛神達變洞合紫清乃以神霄瓊室所祕靈寳眞經六十卷又以昔侍元始同登鬱羅觀覽三元靈光玊網之炁而成髙上神霄玉清祕籙三卷嘗於上皇年間詳考於玉晨之手定格於紫微之房亦在神霄歷劫禁重今並當出乃遺左右仙卿仙吏將其經籙著以人間之義易以世俗之迹置設科式宣揚於志節之士若其得遇此道勤而修之皆是夙簡元名形繪帝軒三華錬骨五輝内纏克保爲壬辰受度之人學眞之士萬劫之中際遇此時是爲難也可不勉之者哉玊清虛皇元始天尊爲祖師上清玉宸元皇道君爲宗師髙上神霄玉清眞王長生大君爲眞師巳上髙上神霄大道三師髙上神霄太上洞玄靈寳度人經六十一卷太上洞玄靈寳度人上品妙經清微金科上品妙經禹餘玉律上品妙經大赤靈文上品妙經玉宸大道上品妙經太一元精上品妙經日精陽明上品妙經月華隂景上品妙經離合五行化體上品妙經斷絶胎根閉塞死戸上品妙經騰曜二景五星上品妙經扶桑青陽上品妙經素景曜靈上品妙經五方正炁上品妙經五行順治上品妙經天地八維安鎭國祚上品妙經求延劫運保世昇平上品妙經飛神召靈上品妙經降眞召靈上品妙經十方聖境上品妙經明體貫炁品九霄髙玄上品妙經九宫仙籍上品妙經八景神合上品妙經玉明運度上品妙經赤符丹光品紫光丹靈上品妙經碧落空歌上品妙經錬炁變仙上品妙經神變炁化上品妙經生化胎根斷除邪穢上品妙經迴骸起死上品妙經長生久視上品妙經三晨光曜保命延生上品妙經降眞延壽上品妙經保胎護命上品妙經消禳國君王侯世土上品妙經太一神變五福護國禳兵上品妙經七星除妖上品妙經神符除難上品妙經洞神禳災上品妙經祈禳水旱上品妙經消除災疫保命延年上品妙經除禳水火漂溺上品妙經解禳山谷瘴癘上品妙經消除病癘跛痾上品妙經顯瑞符應上品妙經隂陽化生上品妙經五行備足生靈壽域上品妙經安鎭九壘土妖不祥上品妙經祈求嗣續慶延門閥上品妙經蠲化水火災癘上品妙經玄明洞淵上品妙經南宫延生上品妙經北都除殃上品妙經斬馘不祥上品妙經斬滅五行邪怪上品妙經追度上世亡魂上品妙經解釋幽牢上品妙經濟度死魂上品妙經化尸受形上品妙經永斷輪轉上品妙經巳上經題各有太上洞玄靈寳無量度人上品妙經字髙上神霄靈寳度人經六十一卷並出於神霄東極華堂瓊室之中乃歴劫禁祕永傳經也得遇此道保巳則登昇三境爲人則却滅百痾功德恊著克度神霄後當獲補宰制治化之官矣世人受誦修奉如法即得福慶無量功驗之應各如本經所載者髙上神霄玉清祕籙神霄玉清祕籙按太微科格與洞眞齊妙亦上清之標冠矣可輔於大洞之品而受佩如法隨其學功各如本籙所言
